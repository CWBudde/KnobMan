<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KnobMan</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="loading">Loading KnobMan...</div>

    <div id="app" style="display: none">
      <header id="toolbar">
        <span class="app-title">KnobMan</span>
        <button id="btnNew" title="New">New</button>
        <button id="btnOpen" title="Open .knob file">Open</button>
        <button id="btnSamples" title="Open sample project">Samples</button>
        <button id="btnSave" title="Save .knob file">Save</button>
        <span class="sep"></span>
        <button id="btnExport" title="Export image strip">Export</button>
        <button id="btnPreviewWin" title="Open detached animated preview">
          Preview
        </button>
        <span class="sep"></span>
        <button id="btnUndo" title="Undo (Ctrl+Z)">Undo</button>
        <button id="btnRedo" title="Redo (Ctrl+Y)">Redo</button>
        <input
          type="file"
          id="fileInput"
          accept=".knob"
          style="display: none"
        />
      </header>

      <main id="workspace">
        <!-- Left: Layer panel -->
        <aside id="layerPanel">
          <div id="layerPanelHeader">Layers</div>
          <ul id="layerList"></ul>
          <div id="layerControls">
            <button id="btnAddLayer" title="Add layer">+</button>
            <button id="btnDeleteLayer" title="Delete layer">−</button>
            <button id="btnMoveUp" title="Move up">↑</button>
            <button id="btnMoveDown" title="Move down">↓</button>
            <button id="btnDuplicate" title="Duplicate layer">⊕</button>
          </div>
        </aside>

        <!-- Center: Preview canvas -->
        <section id="previewSection">
          <div id="canvasWrap">
            <canvas id="knobCanvas"></canvas>
            <canvas id="shapeOverlay"></canvas>
          </div>
          <div id="frameScrubber">
            <label for="frameSlider">Frame:</label>
            <input
              type="range"
              id="frameSlider"
              min="0"
              max="30"
              value="0"
              step="1"
            />
            <span id="frameValue">0</span>
            <label for="zoomSelect" style="margin-left:12px">Zoom:</label>
            <select id="zoomSelect">
              <option value="1">1×</option>
              <option value="2">2×</option>
              <option value="4">4×</option>
              <option value="8" selected>8×</option>
              <option value="16">16×</option>
            </select>
          </div>
          <section id="curveEditorPanel" aria-label="Animation curves">
            <details id="curveEditorDetails">
              <summary>Curve Editor</summary>
              <div class="curve-editor-body">
                <div class="curve-editor-tools">
                  <label
                    >Step:
                    <input
                      type="number"
                      id="curveStepReso"
                      min="0"
                      max="64"
                      step="1"
                      value="0"
                    />
                  </label>
                  <button id="curveDeletePoint" type="button">
                    Delete Point
                  </button>
                </div>
                <div id="curveTabs"></div>
                <canvas id="curveCanvas" width="340" height="210"></canvas>
                <div id="curveHelp">
                  Left click to add/drag points. Right click to delete a point.
                </div>
              </div>
            </details>
          </section>
          <section id="shapeEditorPanel" aria-label="Shape editor">
            <div id="shapeEditorHeader">
              <strong>Shape Editor</strong>
              <div id="shapeToolbar">
                <button type="button" data-shape-mode="M">M</button>
                <button type="button" data-shape-mode="L">L</button>
                <button type="button" data-shape-mode="C">C</button>
                <button type="button" data-shape-mode="Q">Q</button>
                <button type="button" id="shapeClosePath">Z</button>
                <button type="button" id="shapeDeleteSeg">Delete</button>
              </div>
            </div>
            <div id="shapeHelp">
              Select a layer with Primitive = Shape to edit its path.
            </div>
          </section>
          <div id="statusBar">
            <span id="statusMsg">Ready</span>
            <span id="statusMetrics"></span>
          </div>
        </section>

        <!-- Right: Parameters panel -->
        <aside id="paramPanel">
          <div id="paramPanelHeader">Parameters</div>
          <div id="paramContent">
            <p class="placeholder">Select a layer to edit its parameters.</p>
          </div>
        </aside>
      </main>

      <!-- Bottom: Document preferences -->
      <footer id="prefsBar">
        <label
          >Size:
          <input
            type="number"
            id="prefWidth"
            value="64"
            min="8"
            max="512"
            step="1"
          />
          ×
          <input
            type="number"
            id="prefHeight"
            value="64"
            min="8"
            max="512"
            step="1"
          />
        </label>
        <label><input type="checkbox" id="prefLockAspect" /> Lock Ratio</label>
        <label
          >Render:
          <input
            type="number"
            id="prefFrames"
            value="31"
            min="1"
            max="256"
            step="1"
          />
        </label>
        <label
          >Preview:
          <input
            type="number"
            id="prefPreviewFrames"
            value="31"
            min="1"
            max="256"
            step="1"
          />
        </label>
        <label
          >BG:
          <input type="color" id="prefBgColor" value="#000000" />
          <input
            type="range"
            id="prefBgAlpha"
            value="255"
            min="0"
            max="255"
            step="1"
          />
        </label>
        <label
          >Oversample:
          <select id="prefOversample">
            <option value="0">1×</option>
            <option value="1">2×</option>
            <option value="2">4×</option>
            <option value="3">8×</option>
          </select>
        </label>
        <label
          >Export:
          <select id="prefExport">
            <option value="0">PNG Strip (V)</option>
            <option value="1">PNG Strip (H)</option>
            <option value="2">PNG Frames</option>
            <option value="3">Animated GIF</option>
            <option value="4">APNG</option>
          </select>
        </label>
        <label
          >Align:
          <select id="prefAlign">
            <option value="0">Vertical</option>
            <option value="1">Horizontal</option>
          </select>
        </label>
        <label
          >Duration:
          <input
            type="number"
            id="prefDuration"
            value="100"
            min="1"
            max="10000"
            step="1"
          />
        </label>
        <label
          >Loop:
          <input
            type="number"
            id="prefLoop"
            value="0"
            min="0"
            max="9999"
            step="1"
          />
        </label>
        <label><input type="checkbox" id="prefBiDir" /> BiDir</label>
      </footer>
    </div>

    <div id="samplesOverlay" class="samples-overlay" hidden>
      <div
        class="samples-dialog"
        role="dialog"
        aria-modal="true"
        aria-labelledby="samplesTitle"
      >
        <div class="samples-header">
          <h2 id="samplesTitle">Sample Projects</h2>
          <button id="btnCloseSamples" type="button">Close</button>
        </div>
        <label class="samples-search">
          <span>Filter</span>
          <input
            id="sampleSearch"
            type="text"
            placeholder="Type to filter samples..."
          />
        </label>
        <div id="sampleList" class="samples-list"></div>
      </div>
    </div>

    <script src="wasm_exec.js"></script>
    <script src="main.js"></script>
  </body>
</html>
