name: Deploy Web Demo to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.24.x

      - name: Build Go wasm app
        run: |
          mkdir -p web/dist
          GOOS=js GOARCH=wasm go build -mod=mod -buildvcs=false -trimpath -ldflags="-s -w" -o web/dist/knobman.wasm ./cmd/wasm/

      - name: Copy Go wasm runtime JS
        run: cp "$(go env GOROOT)/lib/wasm/wasm_exec.js" web/dist/wasm_exec.js

      - name: Copy static web assets
        run: cp web/index.html web/main.js web/style.css web/dist/

      - name: Copy assets (textures + sample knobs)
        run: cp -r assets web/dist/assets

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
